<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk kamu yang terindah,</title>
    <style>
        /* Import Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap');

        /* Variables for theme colors and styles */
        :root {
            --primary-color: #FFB6C1; /* Light Pink */
            --secondary-color: #E1BEE7; /* Light Purple */
            --text-color: #FFF0F5; /* Lavender Blush */
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.3);
            --shadow-color: rgba(255, 182, 193, 0.4);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background: transparent; /* Dibiarkan transparan agar layer galaksi di belakangnya tidak tertutup */
            overflow-x: hidden;
            color: var(--text-color);
        }

        #galaxy-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            background: transparent;
        }

        /* --- Main Content Layout --- */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            position: relative;
            z-index: 1;
        }

        /* Music Control */
        #music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px var(--shadow-color);
            transition: all 0.3s ease;
        }
        #music-control:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.2);
        }
        #music-icon {
            font-size: 24px;
            color: var(--primary-color);
            animation: pulse-music 2s infinite;
        }
        @keyframes pulse-music {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4.5rem;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px var(--shadow-color);
            animation: pulse-heading 3s infinite ease-in-out;
        }
        @keyframes pulse-heading {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.02); filter: brightness(1.2); text-shadow: 0 0 30px var(--primary-color); }
        }

        /* --- Glassmorphism Card --- */
        .glass-card {
            background: var(--glass-bg);
            border-radius: 25px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            max-width: 800px;
            width: 90%;
            text-align: center;
            margin-bottom: 50px;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 1.5s ease-out forwards;
        }
        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%);
            transform: rotate(30deg);
            pointer-events: none;
            animation: shimmer 8s infinite linear;
        }
        @keyframes shimmer {
            from { transform: translateX(-20%) rotate(30deg); }
            to { transform: translateX(20%) rotate(30deg); }
        }

        h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            color: var(--primary-color);
            margin-bottom: 30px;
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeInUp 1s 0.5s forwards;
        }

        .typed-text-container {
            font-size: 1.3rem;
            line-height: 1.8;
            white-space: pre-wrap;
            min-height: 150px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            animation: float-text 4s ease-in-out infinite;
        }
        @keyframes float-text {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* --- Photo Gallery --- */
        .gallery-title {
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            margin-bottom: 30px;
            color: var(--secondary-color);
            text-shadow: 0 0 15px var(--secondary-color);
            animation: fadeInUp 1s 1s forwards;
            opacity: 0;
        }

        .gallery {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 50px;
            animation: fadeInUp 1s 1.5s forwards;
            opacity: 0;
        }

        .polaroid {
            background: #fff;
            padding: 15px 15px 40px 15px;
            box-shadow: 5px 10px 20px rgba(0,0,0,0.2);
            transform: rotate(calc(var(--r) * 1deg));
            transition: all 0.4s ease;
            position: relative;
            z-index: 2;
        }

        .polaroid:hover {
            transform: scale(1.1) rotate(0deg);
            z-index: 10;
            box-shadow: 0 15px 30px rgba(255, 182, 193, 0.6);
        }

        .polaroid img {
            max-width: 220px;
            height: auto;
            display: block;
            border-bottom: 1px solid #eee;
        }

        .caption {
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            text-align: center;
            font-family: 'Dancing Script', cursive;
            font-size: 1.4rem;
            color: #333;
        }

        /* --- Button & Particles --- */
        .hug-button {
            padding: 15px 40px;
            font-size: 1.3rem;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 25px var(--shadow-color);
            transition: all 0.3s ease;
            outline: none;
            position: relative;
            overflow: hidden;
            animation: pulse-button 2s infinite;
        }
        @keyframes pulse-button {
            0% { transform: scale(1); box-shadow: 0 10px 25px var(--shadow-color); }
            50% { transform: scale(1.05); box-shadow: 0 15px 35px var(--primary-color); }
            100% { transform: scale(1); box-shadow: 0 10px 25px var(--shadow-color); }
        }

        .hug-button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 35px var(--primary-color);
        }
        .hug-button:active {
            transform: translateY(2px) scale(0.98);
        }

        .particle {
            position: fixed;
            bottom: -50px;
            font-size: 24px;
            animation: float-up linear forwards;
            z-index: 0;
            pointer-events: none;
            opacity: 0.8;
        }

        @keyframes float-up {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 1;
            }
            25% {
                transform: translateY(-25vh) translateX(calc(var(--x-sway) * 20px)) rotate(calc(var(--r-spin) * 90deg));
            }
            50% {
                transform: translateY(-50vh) translateX(calc(var(--x-sway) * -20px)) rotate(calc(var(--r-spin) * 180deg));
                opacity: 0.8;
            }
            75% {
                transform: translateY(-75vh) translateX(calc(var(--x-sway) * 20px)) rotate(calc(var(--r-spin) * 270deg));
            }
            100% {
                transform: translateY(-120vh) translateX(calc(var(--x-sway) * -20px)) rotate(calc(var(--r-spin) * 360deg));
                opacity: 0;
            }
        }

        /* --- Opening Screen --- */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1.5s ease-out, visibility 1.5s;
        }
        .overlay-content {
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .overlay-content:hover {
            transform: scale(1.05);
        }
        .overlay h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
            background: linear-gradient(to right, #fff, var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .overlay p {
            font-size: 1.2rem;
            color: #ddd;
            letter-spacing: 1px;
        }

        /* --- Helper Animations --- */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Responsive Design --- */
        @media (max-width: 768px) {
            h1 { font-size: 3.5rem; }
            h2 { font-size: 2.2rem; }
            .typed-text-container { font-size: 1.1rem; min-height: 200px; }
            .gallery-title { font-size: 2.5rem; }
            .polaroid img { max-width: 150px; }
            .caption { font-size: 1.1rem; bottom: 5px; }
            .glass-card { padding: 25px; }
        }

            position: fixed;
            top: 0; left: 0;

<body>

    <!-- Music Audio Element -->
    <audio id="bg-music" loop>
        <source src="musik.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <!-- Opening Screen -->
    <div class="overlay" id="overlay">
        <div class="overlay-content" onclick="startExperience()">
            <h1>Ada Sebuah Pesan Untukmu di hari yang spesial ini...</h1>
            <p>Klik di sini untuk membuka</p>
        </div>
    </div>

    <!-- CSS Starfield Fallback (selalu tampil walau canvas JS gagal) -->
    <div id="css-galaxy">
        <div class="nebula-blob purple"></div>
        <div class="nebula-blob pink"></div>
        <div class="star-layer small"></div>
        <div class="star-layer medium"></div>
        <div class="star-layer pink"></div>
    </div>

    <!-- Background Effects (Galaxy 3D Canvas) -->
    <canvas id="galaxy-canvas"></canvas>

    <!-- Main Content -->
    <div class="container" id="main-container">
        <!-- Music Control Button -->
        <div id="music-control" onclick="toggleMusic()">
            <span id="music-icon">🎵</span>
        </div>

        <h1>Selamat Ulang Tahun Liaaa ❤️ </h1>

        <div class="glass-card">
            <h2>PESAN DARI AKSARA TANPA MAKNA</h2>
            <div class="typed-text-container" id="typed-text"></div>
        </div>

        <div class="gallery-title">Pesona Kesayanganku</div>
        <div class="gallery">
            <div class="polaroid" style="--r: -3;">
                <img src="image/Foto 1.jpg" alt="Foto Dia 1" onerror="this.src='https://placehold.co/220x250/FFB6C1/fff?text=foto3.jpg'">
                <div class="caption">Senyum yang paling aku suka</div>
            </div>
            <div class="polaroid" style="--r: 2;">
                <img src="image/Foto 2.jpg" alt="Foto Dia 2" onerror="this.src='https://placehold.co/220x250/E1BEE7/fff?text=foto2.jpg'">
                <div class="caption">Foto berdua terakhir</div>
            </div>
            <div class="polaroid" style="--r: -1;">
                <img src="image/Foto 1.jpg" alt="Foto Dia 1" onerror="this.src='https://placehold.co/220x250/FFB6C1/fff?text=foto1.jpg'">
                <div class="caption">Manusia terindahku ❤️</div>
            </div>
        </div>

        <button class="hug-button" onclick="sendVirtualHug()">Coba Tekan Tombol Ini</button>
    </div>

    <script>
        const message = "Terima kasih sudah lahir ke dunia ini dan bertahan hingga saat ini.\n\nJika aku adalah baris-baris aksara yang kehilangan arti, maka kamumu adalah sebuah hal yang begitu sempurna, sebuah jeda paling indah yang memberi pelengkap pada setiap bait doa. Setiap detik bersamamu waktu itu adalah kebahagiaan yang teramat luas, yang tak akan pernah cukup diringkas oleh kata-kata.\n\nDi usia yang baru ini, semoga semesta memeluk erat seluruh impianmu, menerangi jalanmu dengan bahagia, dan melimpahkan segala kebaikan yang paling tulus hanya untuk jiwamu yang indah. Semoga harimu dipenuhi senyuman yang tak pernah pudar, karena kamu layak mendapatkan seluruh cinta yang ada di dunia ini.\n\nI miss you, and I hope happiness follows you wherever you go.";
        const speed = 50;
        let i = 0;
        let isExperienceStarted = false;
        const bgMusic = document.getElementById('bg-music');
        const musicIcon = document.getElementById('music-icon');
        let isMusicPlaying = false;

        function typeWriter() {
            if (i < message.length) {
                document.getElementById("typed-text").innerHTML += message.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            }
        }

        function startExperience() {
            if (isExperienceStarted) return;
            isExperienceStarted = true;

            const overlay = document.getElementById('overlay');
            const container = document.getElementById('main-container');

            overlay.style.opacity = '0';
            overlay.style.visibility = 'hidden';

            setTimeout(() => {
                container.style.opacity = '1';
                typeWriter();
                toggleMusic(); 
                setInterval(createAmbientParticle, 800); 
            }, 1000);
        }

        function toggleMusic() {
            if (isMusicPlaying) {
                bgMusic.pause();
                musicIcon.textContent = '🔇';
                musicIcon.style.animation = 'none';
                musicIcon.style.opacity = '0.6';
            } else {
                bgMusic.play().catch(e => console.log("Audio autoplay prevented:", e));
                musicIcon.textContent = '🎵';
                musicIcon.style.animation = 'pulse-music 2s infinite';
                musicIcon.style.opacity = '1';
            }
            isMusicPlaying = !isMusicPlaying;
        }

        function createParticle(x, emoji) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            particle.innerHTML = emoji;
            particle.style.left = x + 'px';
            particle.style.setProperty('--x-sway', Math.random() * 2 - 1);
            particle.style.setProperty('--r-spin', Math.random() * 2 - 1);
            
            const size = Math.random() * 20 + 15;
            particle.style.fontSize = size + 'px';
            
            const duration = Math.random() * 3 + 4;
            particle.style.animationDuration = duration + 's';

            document.body.appendChild(particle);

            setTimeout(() => {
                particle.remove();
            }, duration * 1000);
        }

        function createAmbientParticle() {
            if (!isExperienceStarted || document.hidden) return; 
            const emojis = ['✨', '🌸', '💖', '🥰'];
            const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            const x = Math.random() * window.innerWidth;
            createParticle(x, randomEmoji);
        }

        function sendVirtualHug() {
            const emojis = ['🧸', '🌸', '🥰', '✨', '💖', '❤️'];
            const numParticles = 40;

            for (let j = 0; j < numParticles; j++) {
                const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
                const x = Math.random() * window.innerWidth;
                setTimeout(() => {
                    createParticle(x, randomEmoji);
                }, j * 100);
            }
        }

        // ==========================================
        // 3D GALAXY CANVAS ANIMATION
        // ==========================================
        try {
        const canvas = document.getElementById('galaxy-canvas');
        if (!canvas) throw new Error('Canvas #galaxy-canvas tidak ditemukan di DOM');
        const ctx = canvas.getContext('2d');
        if (!ctx) throw new Error('2D context tidak tersedia di browser ini');
        let width, height;
        let stars = [];
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // Parallax effect following mouse
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - width / 2) * 0.05; 
            mouseY = (e.clientY - height / 2) * 0.05;
        });
        
        // Support touch devices for parallax
        document.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) {
                mouseX = (e.touches[0].clientX - width / 2) * 0.05; 
                mouseY = (e.touches[0].clientY - height / 2) * 0.05;
            }
        });

        class Star {
            constructor() {
                this.reset(true);
            }
            reset(randomZ = false) {
                this.x = (Math.random() - 0.5) * 4000;
                this.y = (Math.random() - 0.5) * 4000;
                // Random depth (z)
                this.z = randomZ ? Math.random() * 2000 : 2000;
                this.radius = Math.random() * 1.5 + 0.5;
                // Romantic aesthetic colors for the stars
                const colors = ['#ffffff', '#ffe9f0', '#e9d6ff', '#b3d4ff', '#ffb3c6', '#ffd1dc'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.alpha = Math.random();
            }
            update() {
                this.z -= 1.5; // Speed of flying through space
                if (this.z <= 0) {
                    this.reset();
                }
            }
            draw() {
                const fov = 400;
                const projectedX = (this.x / this.z) * fov + width / 2;
                const projectedY = (this.y / this.z) * fov + height / 2;
                const projectedRadius = (this.radius / this.z) * fov;

                if (projectedRadius < 0) return;

                // Twinkling effect
                this.alpha += (Math.random() - 0.5) * 0.1;
                if (this.alpha < 0.2) this.alpha = 0.2;
                if (this.alpha > 1) this.alpha = 1;

                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(projectedX, projectedY, Math.max(0, projectedRadius), 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();

                // Add glowing effect to larger stars
                if (this.radius > 1.2) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = this.color;
                } else {
                    ctx.shadowBlur = 0;
                }
                ctx.globalAlpha = 1;
            }
        }

        // Create dense starfield (1200 stars)
        for (let j = 0; j < 1200; j++) {
            stars.push(new Star());
        }

        // Shooting stars for extra romantic magic
        class ShootingStar {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width * 0.6 + width * 0.1;
                this.y = Math.random() * height * 0.3;
                this.len = Math.random() * 120 + 80;
                this.speed = Math.random() * 12 + 10;
                this.angle = Math.PI / 4 + (Math.random() * 0.2 - 0.1);
                this.life = 1;
                this.active = false;
            }
            trigger() {
                this.reset();
                this.active = true;
            }
            update() {
                if (!this.active) return;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.life -= 0.02;
                if (this.life <= 0 || this.x > width || this.y > height) {
                    this.active = false;
                }
            }
            draw() {
                if (!this.active) return;
                const tailX = this.x - Math.cos(this.angle) * this.len;
                const tailY = this.y - Math.sin(this.angle) * this.len;
                const grad = ctx.createLinearGradient(this.x, this.y, tailX, tailY);
                grad.addColorStop(0, `rgba(255, 255, 255, ${this.life})`);
                grad.addColorStop(0.4, `rgba(255, 200, 230, ${this.life * 0.5})`);
                grad.addColorStop(1, 'rgba(255, 200, 230, 0)');
                ctx.strokeStyle = grad;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(tailX, tailY);
                ctx.stroke();
            }
        }
        const shootingStars = [new ShootingStar(), new ShootingStar()];
        function maybeTriggerShootingStar() {
            if (Math.random() < 0.015) {
                const idle = shootingStars.find(s => !s.active);
                if (idle) idle.trigger();
            }
        }
        setInterval(maybeTriggerShootingStar, 300);

        let angle = 0;
        function animateGalaxy() {
            // Smoothly move view towards mouse target (parallax)
            targetX += (mouseX - targetX) * 0.05;
            targetY += (mouseY - targetY) * 0.05;

            // Deep space with slight transparency for a trailing/smooth motion blur effect
            ctx.fillStyle = 'rgba(2, 1, 17, 0.35)'; 
            ctx.fillRect(0, 0, width, height);

            // Romantic Nebula glow #1 - Purple, slowly drifting
            const nebulaOffsetX1 = Math.sin(angle * 40) * width * 0.15;
            const nebulaOffsetY1 = Math.cos(angle * 30) * height * 0.1;
            const gradient1 = ctx.createRadialGradient(
                width * 0.35 + nebulaOffsetX1, height * 0.4 + nebulaOffsetY1, 0,
                width * 0.35 + nebulaOffsetX1, height * 0.4 + nebulaOffsetY1, Math.max(width, height) * 0.55
            );
            gradient1.addColorStop(0, 'rgba(148, 60, 230, 0.22)'); // Deep Purple core
            gradient1.addColorStop(0.5, 'rgba(148, 60, 230, 0.08)');
            gradient1.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient1;
            ctx.fillRect(0, 0, width, height);

            // Romantic Nebula glow #2 - Pink, slowly drifting
            const nebulaOffsetX2 = Math.cos(angle * 25) * width * 0.15;
            const nebulaOffsetY2 = Math.sin(angle * 35) * height * 0.1;
            const gradient2 = ctx.createRadialGradient(
                width * 0.65 + nebulaOffsetX2, height * 0.6 + nebulaOffsetY2, 0,
                width * 0.65 + nebulaOffsetX2, height * 0.6 + nebulaOffsetY2, Math.max(width, height) * 0.55
            );
            gradient2.addColorStop(0, 'rgba(255, 105, 180, 0.20)'); // Hot Pink core
            gradient2.addColorStop(0.5, 'rgba(255, 105, 180, 0.07)');
            gradient2.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient2;
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            // Move origin to center for rotation
            ctx.translate(width / 2 + targetX, height / 2 + targetY);
            angle += 0.0005; // Slow rotation of the entire galaxy
            ctx.rotate(angle);
            ctx.translate(-width / 2 - targetX, -height / 2 - targetY);

            // Update and draw all stars
            stars.forEach(star => {
                star.update();
                star.draw();
            });

            ctx.restore();

            // Draw shooting stars on top, unaffected by galaxy rotation
            shootingStars.forEach(s => {
                s.update();
                s.draw();
            });

            requestAnimationFrame(animateGalaxy);
        }
        
        // Start animation immediately
        animateGalaxy();
        } catch (err) {
            console.error('Galaxy canvas gagal dijalankan, fallback CSS starfield tetap aktif:', err);
        }
    </script>
</body>
</html>
